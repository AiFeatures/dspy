#
# CI entrypoint — delegates to enterprise-ci-cd reusable workflows.
# Wave 2 hardening: BACKLOG.md P0 — ci-adoption theme.
#
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  python:
    uses: Ai-road-4-You/enterprise-ci-cd/.github/workflows/ci-python.yml@v1
    with:
      python-version: "3.12"
      lint-tool: ruff
      formatter: ruff-format
      test-framework: pytest
      coverage-threshold: 0
      run-dependency-review: true

  security:
    uses: Ai-road-4-You/enterprise-ci-cd/.github/workflows/security-scan.yml@v1
    with:
      language: python
      run-sast: true
      run-dependency-audit: true
      run-secret-scan: true
      fail-on-high: true
